          clientPrivateKey: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/keystore/9fb92bfe687d412410cfcfa7da3c902b586aa3a3249071383f605e09c5a4ef10_sk'          #私钥
