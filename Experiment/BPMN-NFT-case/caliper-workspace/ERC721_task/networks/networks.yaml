          clientSignedCert: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/user2@Mem.org.comMSP-cert.pem'      #证书
          clientPrivateKey: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/keystore/bf1c9eb49aafaf0205cf5e50444bdfd4a3fa7914a6ebf9ced0080005caa47e04_sk'
