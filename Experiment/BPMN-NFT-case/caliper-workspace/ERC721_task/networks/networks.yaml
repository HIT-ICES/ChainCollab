name: ChainCollab-Network
version: 2.0.0
#区块链类型
caliper:
  blockchain: fabric
  fabric: #xinjia
    gateway:
      localhost: false
#fabric链码信息
channels:
  - channelName: default
    contracts:
      - id: test7   # 你的链码名
#定义身份信息
organizations:
  #组织名
