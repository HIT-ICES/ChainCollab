test:
  name: flow-a-to-b
  description: >
    (NOTE) Use a fresh runId each run, or delete token-pools/<runId>/ between runs.

    BPMN process benchmark:
    premint by user1/user2, mint by user1,
    transfer by user1, burn by user2.
    Token IDs are persisted to token-pools/<runId>/minted_ids.txt
    and later rounds consume from that manifest (no "guessed tokenId pool").
  workers:
    type: local
    number: 10     # 并发 worker 数（不是 TPS）

  rounds:
    - label: premint
      txNumber: 6000 # 总共测试数（建议 = prepTransferCount + prepBurnCount）
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: ./workload/premint.js
        arguments:
          channel: default
          contractId: test
          runId: run_20261154
          prepTransferCount: 3000
          prepBurnCount: 3000
          batchSize: 200
          poolBaseDir: /hyperledger/caliper/workspace
          # token1CountA: 3000
          # token1CountB: 3000

    - label: branch
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: ./workload/refmint.js 
        arguments:
          channel: default
          contractId: test
          runId: run_20261154
          mintCount: 3000
          mintStart: 1000000
          batchSize: 200
          poolBaseDir: /hyperledger/caliper/workspace

