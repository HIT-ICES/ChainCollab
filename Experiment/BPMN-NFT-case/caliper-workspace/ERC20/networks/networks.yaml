#随便取            #工作目录为caliper-workspace
name: ChainCollab-Network
version: 2.0.0
#区块链类型
caliper:
  blockchain: fabric
  fabric: #xinjia
    gateway:
      localhost: false
#fabric链码信息
channels:
  - channelName: default
    contracts:
      - id: ERC20   # 你的链码名
#定义身份信息
organizations:
  #组织名
  - mspid: Mem.org.comMSP
    identities:
      certificates:
        - name: 'user1'
          clientSignedCert: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/user1@Mem.org.comMSP-cert.pem'     #证书
          clientPrivateKey: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/keystore/7192c0778d6509a92ce216b4999a19865ca5e6cf7367cb4310ff553e34c41fd8_sk'          #私钥
        - name: user2
          clientSignedCert: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/user2@Mem.org.comMSP-cert.pem'      #证书
          clientPrivateKey: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/keystore/eb161809338e7305710a50762f86225e0d686811be0500f51b3cca1ca6ac0618_sk'
        - name: user3
          clientSignedCert: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/user3@Mem.org.comMSP-cert.pem'      #证书
          clientPrivateKey: 
            path: './1_msp/mem.org.com/crypto-config/peerOrganizations/mem.org.com/msp/keystore/b29f38ae8a52920fb944f6e662a252db2a0b4c5727bf0866c4118484f1d903d1_sk'
