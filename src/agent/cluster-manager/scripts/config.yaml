# config.yaml

system:
  mode: dev  # dev | prod

services:
  mysql:
    host: localhost
    port: 3306
    user: root
    password: password
    dbname: devdb
    image: mysql:5.7 

  redis:
    host: localhost
    port: 6379
    password: ""
    db: 0
    image: redis:latest  # 可选

app:
  mq:
    redis:
      addr: localhost:6379
      db: 0
      password: ""
      stream: Tasks
      group: TasksGroup
      consumer_id: TasksConsumer
    type: redis

  workers:
    worker_count: 5
  db:
    type: mysql
    mysql:
      host: localhost
      port: 3306
      user: root
      password: password
      dbname: devdb
      max_open_conns: 10
      max_idle_conns: 5
      conn_max_lifetime: 300