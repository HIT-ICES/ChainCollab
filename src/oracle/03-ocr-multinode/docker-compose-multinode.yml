version: "3.8"

services:
  postgres1:
    image: postgres:15
    container_name: chainlink-postgres1
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlink1
      POSTGRES_PASSWORD: ChainlinkPostgresPass123!
      POSTGRES_DB: chainlink1
    # Keep DB internal; Chainlink nodes connect via Docker network.
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata1:/var/lib/postgresql/data
    networks:
      - existing_network

  postgres2:
    image: postgres:15
    container_name: chainlink-postgres2
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlink2
      POSTGRES_PASSWORD: ChainlinkPostgresPass123!
      POSTGRES_DB: chainlink2
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata2:/var/lib/postgresql/data
    networks:
      - existing_network

  postgres3:
    image: postgres:15
    container_name: chainlink-postgres3
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlink3
      POSTGRES_PASSWORD: ChainlinkPostgresPass123!
      POSTGRES_DB: chainlink3
    # ports:
    #   - "5434:5432"
    volumes:
      - pgdata3:/var/lib/postgresql/data
    networks:
      - existing_network

  postgres4:
    image: postgres:15
    container_name: chainlink-postgres4
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlink4
      POSTGRES_PASSWORD: ChainlinkPostgresPass123!
      POSTGRES_DB: chainlink4
    # ports:
    #   - "5435:5432"
    volumes:
      - pgdata4:/var/lib/postgresql/data
    networks:
      - existing_network

  postgres-bootstrap:
    image: postgres:15
    container_name: chainlink-postgres-bootstrap
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlink-bootstrap
      POSTGRES_PASSWORD: ChainlinkPostgresPass123!
      POSTGRES_DB: chainlink-bootstrap
    # ports:
    #   - "5431:5432"
    volumes:
      - pgdatabootstrap:/var/lib/postgresql/data
    networks:
      - existing_network

  chainlink-bootstrap:
    image: smartcontract/chainlink:2.12.0
    container_name: chainlink-bootstrap
    depends_on:
      - postgres-bootstrap
    restart: unless-stopped
    ports:
      - "6687:6688"         # Node HTTP/API
      - "6690:6690"         # libp2p default listening
    volumes:
      - ./chainlink-bootstrap:/chainlink
    command: >
      node --config /chainlink/config.toml --secrets /chainlink/secrets.toml start --api /chainlink/.api --password /chainlink/.password
    networks:
      - existing_network

  chainlink1:
    image: smartcontract/chainlink:2.12.0
    container_name: chainlink-node1
    depends_on:
      - postgres1
      - chainlink-bootstrap
    restart: unless-stopped
    ports:
      - "6688:6688"
      - "6698:6698"
    volumes:
      - ./chainlink1:/chainlink
    command: >
      node --config /chainlink/config.toml --secrets /chainlink/secrets.toml start --api /chainlink/.api --password /chainlink/.password
    networks:
      - existing_network
    environment:
      - CHAINLINK_P2P_PORT=6698

  chainlink2:
    image: smartcontract/chainlink:2.12.0
    container_name: chainlink-node2
    depends_on:
      - postgres2
      - chainlink-bootstrap
    restart: unless-stopped
    ports:
      - "6689:6688"
      - "6699:6699"
    volumes:
      - ./chainlink2:/chainlink
    command: >
      node --config /chainlink/config.toml --secrets /chainlink/secrets.toml start --api /chainlink/.api --password /chainlink/.password
    networks:
      - existing_network
    environment:
      - CHAINLINK_P2P_PORT=6699

  chainlink3:
    image: smartcontract/chainlink:2.12.0
    container_name: chainlink-node3
    depends_on:
      - postgres3
      - chainlink-bootstrap
    restart: unless-stopped
    ports:
      - "6691:6688"
      - "6697:6697"
    volumes:
      - ./chainlink3:/chainlink
    command: >
      node --config /chainlink/config.toml --secrets /chainlink/secrets.toml start --api /chainlink/.api --password /chainlink/.password
    networks:
      - existing_network
    environment:
      - CHAINLINK_P2P_PORT=6697

  chainlink4:
    image: smartcontract/chainlink:2.12.0
    container_name: chainlink-node4
    depends_on:
      - postgres4
      - chainlink-bootstrap
    restart: unless-stopped
    ports:
      - "6692:6688"
      - "6696:6696"
    volumes:
      - ./chainlink4:/chainlink
    command: >
      node --config /chainlink/config.toml --secrets /chainlink/secrets.toml start --api /chainlink/.api --password /chainlink/.password
    networks:
      - existing_network
    environment:
      - CHAINLINK_P2P_PORT=6696

  # anvil:
  #   image: ghcr.io/foundry-rs/foundry:latest
  #   container_name: chainlink-anvil
  #   restart: unless-stopped
  #   ports:
  #     - "8545:8545"
  #   entrypoint:
  #     - anvil
  #   command:
  #     - --host
  #     - 0.0.0.0
  #     - --ws
  #     - --chain-id
  #     - "31337"
  #     - --mnemonic
  #     - test test test test test test test test test test test junk

volumes:
  pgdata1:
  pgdata2:
  pgdata3:
  pgdata4:
  pgdatabootstrap:

networks:
  existing_network:
    external: true
    name: cello-net
