version: "3.8"

services:
  cdmn-node1:
    build:
      context: ./cdmn-python-server
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${CDMN_BASE_IMAGE:-python:3.9-slim}
    image: chaincollab-cdmn-server:latest
    container_name: cdmn-node1
    restart: unless-stopped
    environment:
      - FLASK_RUN_PORT=5000
      - OCR_LISTENER_ENABLED=true
      - OCR_RPC_URL=${OCR_RPC_URL:-http://system-geth-node:8545}
      - OCR_AGGREGATOR_ADDRESS=${OCR_AGGREGATOR_ADDRESS}
      - FIREFLY_CORE_URL=${FIREFLY_CORE_URL:-http://host.docker.internal:5002}
      - IPFS_GATEWAY_URL=${IPFS_GATEWAY_URL:-http://host.docker.internal:10207/ipfs}
      - DMN_FETCH_TIMEOUT=${DMN_FETCH_TIMEOUT:-15}
    ports:
      - "8081:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - existing_network

  cdmn-node2:
